services:
  sync-api:
    build:
      context: ./sync-api
      dockerfile: Dockerfile
    container_name: obsidian-sync-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgresql:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      HERMES_API_KEY: ${HERMES_API_KEY}
      HERMES_AGENT_ENABLED: ${HERMES_AGENT_ENABLED:-false}
      HERMES_AGENT_VAULT_ID: ${HERMES_AGENT_VAULT_ID:-}
      HERMES_AGENT_VAULT_PASSWORD: ${HERMES_AGENT_VAULT_PASSWORD:-}
      HERMES_AGENT_INTERVAL_SECONDS: ${HERMES_AGENT_INTERVAL_SECONDS:-60}
      HERMES_AGENT_CREATE_FOLDER: ${HERMES_AGENT_CREATE_FOLDER:-Inbox/Hermes}
      HERMES_AGENT_GITHUB_PROJECT_FOLDER: ${HERMES_AGENT_GITHUB_PROJECT_FOLDER:-30-开发项目/Git开源项目}
      HERMES_AGENT_INBOX_PATH: ${HERMES_AGENT_INBOX_PATH:-Inbox/Telegram.md}
      HERMES_AGENT_APPEND_SCORE_THRESHOLD: ${HERMES_AGENT_APPEND_SCORE_THRESHOLD:-6}
      HERMES_AGENT_EXCLUSIONS: ${HERMES_AGENT_EXCLUSIONS:-90-密钥凭证/**}
      HERMES_AGENT_ROUTING_RULES: ${HERMES_AGENT_ROUTING_RULES:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      ADMIN_BACKUP_ENABLED: ${ADMIN_BACKUP_ENABLED:-false}
      ADMIN_BACKUP_INTERVAL_HOURS: ${ADMIN_BACKUP_INTERVAL_HOURS:-24}
      ADMIN_BACKUP_DIRECTORY: ${ADMIN_BACKUP_DIRECTORY:-/app/backups}
      ADMIN_BACKUP_KEEP_LOCAL: ${ADMIN_BACKUP_KEEP_LOCAL:-14}
      ADMIN_BACKUP_RCLONE_REMOTE: ${ADMIN_BACKUP_RCLONE_REMOTE:-}
      ADMIN_BACKUP_RCLONE_CONFIG: ${ADMIN_BACKUP_RCLONE_CONFIG:-}
      ADMIN_BACKUP_TIMEOUT_SECONDS: ${ADMIN_BACKUP_TIMEOUT_SECONDS:-600}
      ADMIN_PUBLIC_URL: ${ADMIN_PUBLIC_URL:-}
      ADMIN_GOOGLE_CLIENT_ID: ${ADMIN_GOOGLE_CLIENT_ID:-}
      ADMIN_GOOGLE_CLIENT_SECRET: ${ADMIN_GOOGLE_CLIENT_SECRET:-}
      ADMIN_GOOGLE_REDIRECT_URI: ${ADMIN_GOOGLE_REDIRECT_URI:-}
      ADMIN_GOOGLE_TOKEN_FILE: ${ADMIN_GOOGLE_TOKEN_FILE:-/app/backups/google-drive-token.json}
      ADMIN_GOOGLE_DRIVE_FOLDER_ID: ${ADMIN_GOOGLE_DRIVE_FOLDER_ID:-}
      ADMIN_GOOGLE_DRIVE_FOLDER_NAME: ${ADMIN_GOOGLE_DRIVE_FOLDER_NAME:-Obsidian Sync Backups}
    ports:
      - "${API_BIND:-0.0.0.0:46990}:8000"
    volumes:
      - ./backups:/app/backups
      - ./rclone:/root/.config/rclone:ro
    networks:
      - onepanel
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: obsidian-telegram-bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-change-this-webhook-secret}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_REPLY_ON_QUEUE: ${TELEGRAM_REPLY_ON_QUEUE:-true}
      TELEGRAM_DELETE_AFTER_QUEUE: ${TELEGRAM_DELETE_AFTER_QUEUE:-false}
      TELEGRAM_POLLING_ENABLED: ${TELEGRAM_POLLING_ENABLED:-true}
      TELEGRAM_POLLING_INTERVAL_SECONDS: ${TELEGRAM_POLLING_INTERVAL_SECONDS:-2}
      TELEGRAM_SKIP_PENDING_ON_START: ${TELEGRAM_SKIP_PENDING_ON_START:-true}
      TELEGRAM_VAULT_ID: ${TELEGRAM_VAULT_ID:-}
      TELEGRAM_TARGET_NOTE_PATH: ${TELEGRAM_TARGET_NOTE_PATH:-Inbox/Telegram.md}
      SYNC_API_URL: http://sync-api:8000
      HERMES_API_KEY: ${HERMES_API_KEY}
    ports:
      - "${TELEGRAM_BIND:-0.0.0.0:46991}:8000"
    networks:
      - onepanel
    depends_on:
      - sync-api
    restart: unless-stopped

networks:
  onepanel:
    external: true
    name: 1panel-network
