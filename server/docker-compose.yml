services:
  postgres:
    image: postgres:15-alpine
    container_name: obsidian-sync-db
    environment:
      POSTGRES_DB: obsidian_sync
      POSTGRES_USER: syncuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncuser -d obsidian_sync"]
      interval: 10s
      timeout: 5s
      retries: 5

  sync-api:
    build:
      context: ./sync-api
      dockerfile: Dockerfile
    container_name: obsidian-sync-api
    environment:
      DATABASE_URL: postgresql+asyncpg://syncuser:${DB_PASSWORD}@postgres:5432/obsidian_sync
      JWT_SECRET: ${JWT_SECRET}
      HERMES_API_KEY: ${HERMES_API_KEY}
      HERMES_AGENT_ENABLED: ${HERMES_AGENT_ENABLED:-false}
      HERMES_AGENT_VAULT_ID: ${HERMES_AGENT_VAULT_ID:-}
      HERMES_AGENT_VAULT_PASSWORD: ${HERMES_AGENT_VAULT_PASSWORD:-}
      HERMES_AGENT_INTERVAL_SECONDS: ${HERMES_AGENT_INTERVAL_SECONDS:-60}
      HERMES_AGENT_CREATE_FOLDER: ${HERMES_AGENT_CREATE_FOLDER:-Inbox/Hermes}
      HERMES_AGENT_INBOX_PATH: ${HERMES_AGENT_INBOX_PATH:-Inbox/Telegram.md}
      HERMES_AGENT_APPEND_SCORE_THRESHOLD: ${HERMES_AGENT_APPEND_SCORE_THRESHOLD:-6}
      HERMES_AGENT_EXCLUSIONS: ${HERMES_AGENT_EXCLUSIONS:-90-密钥凭证/**}
      HERMES_AGENT_ROUTING_RULES: ${HERMES_AGENT_ROUTING_RULES:-}
    ports:
      - "127.0.0.1:8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: obsidian-telegram-bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-change-this-webhook-secret}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_REPLY_ON_QUEUE: ${TELEGRAM_REPLY_ON_QUEUE:-true}
      TELEGRAM_DELETE_AFTER_QUEUE: ${TELEGRAM_DELETE_AFTER_QUEUE:-false}
      TELEGRAM_POLLING_ENABLED: ${TELEGRAM_POLLING_ENABLED:-true}
      TELEGRAM_POLLING_INTERVAL_SECONDS: ${TELEGRAM_POLLING_INTERVAL_SECONDS:-2}
      TELEGRAM_SKIP_PENDING_ON_START: ${TELEGRAM_SKIP_PENDING_ON_START:-true}
      TELEGRAM_VAULT_ID: ${TELEGRAM_VAULT_ID:-}
      TELEGRAM_TARGET_NOTE_PATH: ${TELEGRAM_TARGET_NOTE_PATH:-Inbox/Telegram.md}
      SYNC_API_URL: http://sync-api:8000
      HERMES_API_KEY: ${HERMES_API_KEY}
    ports:
      - "127.0.0.1:8091:8000"
    depends_on:
      - sync-api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: obsidian-sync-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - sync-api
      - telegram-bot
    restart: unless-stopped

volumes:
  pgdata:
